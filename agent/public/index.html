<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintRent - Yerel Ajan</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; color: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 32px; max-width: 520px; width: 90%; text-align: center; }
h1 { font-size: 1.5rem; margin-bottom: 4px; }
.sub { color: #6b7280; font-size: .875rem; margin-bottom: 24px; }
.status { background: #f3f4f6; border-radius: 12px; padding: 16px; margin-bottom: 20px; font-size: .875rem; }
.status .label { color: #6b7280; }
.status .value { font-weight: 600; margin-top: 4px; }
.progress-bar { height: 6px; background: #e5e7eb; border-radius: 3px; margin: 12px 0; overflow: hidden; }
.progress-bar .fill { height: 100%; background: #2563eb; border-radius: 3px; transition: width .3s; width: 0; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: #2563eb; color: white; }
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary { background: #e5e7eb; color: #374151; }
.btn-secondary:hover { background: #d1d5db; }
.results { margin-top: 20px; text-align: left; font-size: .875rem; max-height: 300px; overflow-y: auto; }
.result-item { padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.result-item.success { background: #ecfdf5; color: #065f46; }
.result-item.fail { background: #fef2f2; color: #991b1b; }
.badge { font-size: .75rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
.badge-success { background: #d1fae5; color: #065f46; }
.badge-fail { background: #fee2e2; color: #991b1b; }
input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: .875rem; margin-bottom: 12px; font-family: monospace; }
input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>🖨️ PrintRent</h1>
  <p class="sub">Yerel Ağ Tarama Ajanı — Veri saklamaz, direkt buluta gönderir</p>
  <p style="font-size:.75rem;margin-bottom:16px" id="hostingerLink"></p>

  <div class="status" id="status">
    <div class="label">Durum</div>
    <div class="value" id="statusText">Hazır</div>
    <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
    <div style="font-size:.75rem;color:#9ca3af;margin-top:4px" id="progressText"></div>
  </div>

  <input type="text" id="range" value="192.168.1.0/24" placeholder="IP Aralığı (örn: 192.168.1.0/24)">
  <input type="text" id="hostingerUrl" placeholder="Hostinger API URL" style="display:none">

  <div style="display:flex;gap:8px;justify-content:center">
    <button class="btn btn-primary" id="scanBtn" onclick="startScan()">🔍 Ağı Tara</button>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
let scanning = false;

async function loadStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    if (data.success && data.hostingerUrl) {
      const link = document.getElementById('hostingerLink');
      link.innerHTML = `Veriler <a href="${data.hostingerUrl}" target="_blank" style="color:#2563eb;font-weight:600">${data.hostingerUrl}</a> adresine gonderiliyor.`;
    }
  } catch {}
}
loadStatus();

async function startScan() {
  if (scanning) return;
  const range = document.getElementById('range').value.trim();
  if (!range) return alert('IP aralığı girin');

  scanning = true;
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Taranıyor...';
  document.getElementById('results').innerHTML = '';

  try {
    const res = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ range }),
    });
    const data = await res.json();

    if (data.success) {
      document.getElementById('statusText').textContent = '✅ Tarama tamamlandı';
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressText').textContent = `${data.totalFound} yazıcı bulundu, Hostinger'a gönderildi`;

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<h3 style="margin-bottom:8px;font-size:1rem">Sonuçlar</h3>';
      data.results.forEach(r => {
        if (r.success) {
          resultsDiv.innerHTML += `<div class="result-item success">
            <span>${r.data.ip} — ${r.data.brand || '?'} ${r.data.model ? r.data.model.substring(0, 50) : ''}</span>
            <span class="badge badge-success">${r.data.serialNumber}</span>
          </div>`;
        } else {
          resultsDiv.innerHTML += `<div class="result-item fail">
            <span>${r.ip}</span>
            <span class="badge badge-fail">${r.error}</span>
          </div>`;
        }
      });
    } else {
      document.getElementById('statusText').textContent = '❌ Hata: ' + (data.error || 'Bilinmeyen');
    }
  } catch (err) {
    document.getElementById('statusText').textContent = '❌ Bağlantı hatası: ' + err.message;
  } finally {
    scanning = false;
    btn.disabled = false;
    btn.textContent = '🔍 Ağı Tara';
  }
}

async function pollProgress() {
  try {
    const res = await fetch('/api/scan/progress');
    const data = await res.json();
    if (data.isScanning) {
      const pct = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${data.current}/${data.total} cihaz taranıyor...`;
    }
  } catch {}
}

setInterval(pollProgress, 1000);
</script>
</body>
</html>
