<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintRent Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f4f6;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:32px;max-width:480px;width:90%;text-align:center}
h1{font-size:1.5rem;margin-bottom:4px}
.sub{color:#6b7280;font-size:.875rem;margin:4px 0 20px}
.info{background:#f3f4f6;border-radius:12px;padding:16px;margin-bottom:20px;font-size:.875rem}
.progress{height:6px;background:#e5e7eb;border-radius:3px;margin:12px 0;overflow:hidden}
.progress .fill{height:100%;background:#2563eb;border-radius:3px;transition:width .3s;width:0}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
input{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:.875rem;margin-bottom:12px;font-family:monospace}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
label{display:block;text-align:left;font-size:.75rem;color:#6b7280;margin-bottom:4px}
.r{margin-top:16px;text-align:left;font-size:.875rem;max-height:300px;overflow-y:auto}
.ri{padding:8px 12px;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:.8125rem}
.ri.ok{background:#ecfdf5;color:#065f46}
.ri.fail{background:#fef2f2;color:#991b1b}
.badge{font-size:.7rem;padding:2px 8px;border-radius:99px;font-weight:600}
.badge-ok{background:#d1fae5;color:#065f46}
.badge-fail{background:#fee2e2;color:#991b1b}
.h{display:none}
</style>
</head>
<body>
<div class="card">
  <h1>PrintRent</h1>
  <p class="sub">Yerel Ag Tarama Ajani</p>
  <div id="hostingerInfo" class="info" style="font-size:.75rem;display:none"></div>
  <div class="info">
    <div style="font-weight:600;margin-bottom:8px" id="statusText">Hazir</div>
    <div class="progress"><div class="fill" id="progressFill"></div></div>
    <div style="font-size:.75rem;color:#9ca3af;margin-top:4px" id="progressText"></div>
  </div>
  <label>IP Araligi</label>
  <input type="text" id="range" value="192.168.1.0/24" placeholder="192.168.1.0/24">
  <button class="btn btn-primary" id="scanBtn" onclick="startScan()">Ag'i Tara</button>
  <div class="r" id="results"></div>
</div>
<script>
let scanning = false;
async function load(){try{const r=await fetch('/api/status');const d=await r.json();if(d.success&&d.hostingerUrl){const e=document.getElementById('hostingerInfo');e.style.display='block';e.innerHTML='Veriler <a href="'+d.hostingerUrl+'" target="_blank" style="color:#2563eb;font-weight:600">'+d.hostingerUrl+'</a> adresine gonderiliyor.'}}catch{}}
load();
async function startScan(){if(scanning)return;const range=document.getElementById('range').value.trim();if(!range)return alert('IP araligi girin');scanning=true;const btn=document.getElementById('scanBtn');btn.disabled=true;btn.textContent='Taranıyor...';document.getElementById('results').innerHTML='';try{const r=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({range})});const d=await r.json();if(d.success){document.getElementById('statusText').textContent='Tarama tamamlandi';document.getElementById('progressFill').style.width='100%';document.getElementById('progressText').textContent=d.totalFound+' yazici bulundu';const rd=document.getElementById('results');rd.innerHTML='<div style="font-weight:600;margin-bottom:8px">Sonuclar</div>';d.results.forEach(r=>{if(r.success){rd.innerHTML+='<div class="ri ok"><span>'+r.data.ip+' - '+r.data.brand+' '+((r.data.model||'').substring(0,40))+'</span><span class="badge badge-ok">'+r.data.serialNumber.substring(0,12)+'</span></div>'}else{rd.innerHTML+='<div class="ri fail"><span>'+r.ip+'</span><span class="badge badge-fail">'+r.error+'</span></div>'}})}else{document.getElementById('statusText').textContent='Hata: '+(d.error||'Bilinmeyen')}}catch(e){document.getElementById('statusText').textContent='Baglanti hatasi: '+e.message}finally{scanning=false;btn.disabled=false;btn.textContent='Ag\'i Tara'}}
setInterval(async()=>{try{const r=await fetch('/api/scan/progress');const d=await r.json();if(d.running){const p=d.total>0?Math.round(d.current/d.total*100):0;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=d.current+'/'+d.total+' cihaz...'}}catch{}},1000);
</script>
</body>
</html>
